name: Daily S-1 Extract

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit ipo_filings.db back

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run extraction pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDGAR_CONTACT_EMAIL: ${{ secrets.EDGAR_CONTACT_EMAIL }}
        run: python main.py --no-email

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ipo_filings.db
          if git diff --staged --quiet; then
            echo "No new filings — database unchanged, skipping commit."
          else
            git commit -m "chore: update ipo_filings.db [skip ci]"
            git push
          fi
